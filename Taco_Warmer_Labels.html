<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudy's Warmer Labels</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e1e1e;
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    color: #fff;
    padding: 24px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
  }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.2em; color: #F5C518; margin-bottom: 4px; }
  .header-title   { font-size: 26px; font-weight: 800; letter-spacing: 0.02em; }


  .header-edit {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    font-family: inherit; color: inherit; outline: none; display: block;
    width: 100%;
  }
  .header-edit:hover, .header-edit:focus { border-bottom-color: #444; }
  .eyebrow-edit { font-size: 11px; letter-spacing: 0.2em; color: #F5C518; margin-bottom: 4px; }
  .title-edit   { font-size: 26px; font-weight: 800; letter-spacing: 0.02em; color: #fff; }
  .font-controls {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .font-select {
    background: #1e1e1e; border: 1px solid #444; border-radius: 3px;
    color: #fff; font-family: inherit; font-size: 12px;
    padding: 7px 10px; outline: none; cursor: pointer;
  }
  .font-select:focus { border-color: #F5C518; }
  .size-btn {
    background: #333; color: #fff; border: 1px solid #444;
    border-radius: 3px; font-family: inherit; font-size: 15px; font-weight: 700;
    width: 32px; height: 32px; cursor: pointer; line-height: 1;
  }
  .size-btn:hover { background: #444; }
  .size-input {
    background: #1e1e1e;
    border: 1px solid #444;
    border-radius: 3px;
    color: #F5C518;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    width: 40px;
    text-align: center;
    padding: 2px 4px;
    outline: none;
  }
  .size-input:focus { border-color: #F5C518; }
  .size-label {
    font-size: 12px; color: #888; min-width: 36px; text-align: center;
  }

  .per-label-controls {
    max-height: 600px;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    opacity: 1;
  }
  .per-label-controls.hidden {
    max-height: 0;
    opacity: 0;
  }
  .print-btn {
    background: #F5C518; color: #1A1A1A;
    border: none; border-radius: 3px;
    font-family: inherit; font-size: 13px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 20px; cursor: pointer;
  }
  .print-btn:hover { background: #ffd740; }

  /* ── Shelf block ── */
  .shelf-block { background: #2a2a2a; border-radius: 6px; padding: 18px; margin-bottom: 16px; }

  .shelf-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .shelf-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #F5C518;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    width: 180px;
    padding: 2px 4px;
    outline: none;
  }
  .shelf-name-input:focus { border-bottom-color: #F5C518; }

  .shelf-header-btns { display: flex; gap: 8px; }

  .btn-sm {
    background: #333; color: #aaa;
    border: 1px solid #444; border-radius: 3px;
    font-family: inherit; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 12px; cursor: pointer;
  }
  .btn-sm:hover { background: #444; color: #fff; }
  .btn-sm.danger:hover { background: #5a1a1a; color: #ff8888; border-color: #7a2a2a; }

  /* ── Inputs ── */
  .inputs-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .input-group { display: flex; flex-direction: column; gap: 5px; min-width: 170px; flex: 1; }
  .input-group label { font-size: 9px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
  .input-row { display: flex; gap: 6px; align-items: stretch; }
  .input-name {
    flex: 1;
    background: #1e1e1e; border: 1px solid #444; border-radius: 3px;
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 700;
    padding: 6px 9px; text-transform: uppercase; outline: none;
  }
  .input-price {
    width: 68px;
    background: #1e1e1e; border: 1px solid #444; border-radius: 3px;
    color: #F5C518; font-family: inherit; font-size: 13px; font-weight: 700;
    padding: 6px 9px; outline: none;
  }
  .input-name:focus, .input-price:focus { border-color: #F5C518; }
  .input-cat {
    background: #1e1e1e; border: 1px solid #444; border-radius: 3px;
    color: #C1272D; font-family: inherit; font-size: 11px; font-weight: 700;
    padding: 6px 9px; outline: none; letter-spacing: 0.08em; text-transform: uppercase;
    width: 100%;
  }
  .input-cat:focus { border-color: #F5C518; }
  .input-custom-cat {
    background: #1e1e1e; border: 1px solid #F5C518; border-radius: 3px;
    color: #C1272D; font-family: inherit; font-size: 11px; font-weight: 700;
    padding: 6px 9px; outline: none; letter-spacing: 0.08em; text-transform: uppercase;
    width: 100%; margin-top: 5px; display: none;
  }
  .input-custom-cat:focus { border-color: #F5C518; }
  .remove-btn {
    background: transparent; border: 1px solid #3a3a3a; border-radius: 3px;
    color: #555; font-size: 14px; cursor: pointer; padding: 0 8px;
    line-height: 1;
  }
  .remove-btn:hover { background: #3a1a1a; color: #ff6666; border-color: #5a2a2a; }

  .add-shelf-btn {
    background: transparent;
    border: 1px dashed #444;
    border-radius: 6px;
    color: #666;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-shelf-btn:hover { border-color: #F5C518; color: #F5C518; }

  /* ── Label preview ── */
  .preview-section { margin-top: 28px; }
  .preview-shelf { margin-bottom: 20px; }
  .preview-shelf-label {
    font-size: 10px; letter-spacing: 0.15em; color: #999;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .cards-row { display: flex; flex-wrap: wrap; gap: 6px; }

  /* ── Card ── */
  .card {
    width: 210px; height: 96px;
    background: #F5C518;
    border-radius: 3px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .card-red   { height: 5px; background: #C1272D; flex-shrink: 0; }
  .card-name  { flex: 1; font-weight: 800; color: #1A1A1A; padding: 2px 8px 4px; display: flex; align-items: center; line-height: 1.05; font-size: 21px; overflow: hidden; }
  .card-type  { font-size: 8px; font-weight: 700; color: #C1272D; letter-spacing: 0.12em; text-align: center; padding: 3px 8px 0; flex-shrink: 0; white-space: nowrap; overflow: hidden; }
  .card-type-bottom { text-align: left; padding: 0 8px 3px; }
  .card-price { background: #1A1A1A; color: #F5C518; font-size: 18px; font-weight: 800; padding: 4px 10px; text-align: right; flex-shrink: 0; }

  /* ── Print ── */

  @media (max-width: 768px) {
    body { padding: 12px; }
    .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .header > div:first-child { width: 100%; }
    .header > div:last-child { width: 100%; flex-wrap: wrap; }
    #global-all-controls { flex-wrap: wrap; gap: 6px 12px; }
    .inputs-row { flex-direction: column; }
    .input-group { min-width: unset; width: 100%; }
    .size-btn { width: 36px; height: 36px; font-size: 18px; }
    .cards-row { flex-wrap: wrap; }
    .card { width: 100%; max-width: 300px; }
  }

  .cut-line-h {
    width: 100%;
    border: none;
    border-top: 1px dashed #aaa;
    margin: 8px 0;
  }
  .cut-line-v {
    display: none;
  }
  @media print {
    .cut-line-h { display: block; border-top: 1px dashed #999; margin: 8px 0; }
    .cut-line-v { display: block; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    body { background: #fff; padding: 0; }
    .no-print { display: none !important; }
    .preview-section { margin-top: 0; }
    .preview-shelf { margin-bottom: 14px; break-inside: avoid; }
    .preview-shelf-label { color: #999; font-size: 8pt; margin-bottom: 5px; }
    .cards-row { gap: 16px; }
    .card { width: 2.25in; height: 0.9in; break-inside: avoid; }
    .card-red   { height: 6px; }
    .card-cat   { font-size: 7pt; }
    .card-name  { padding: 2px 8px 2px; }
    .card-price { font-size: 13pt; padding: 2px 8px; }
  }
  @page { size: landscape; margin: 0.4in; }
</style>
</head>
<body>

<div class="no-print">
  <div class="header">
    <div style="margin-right:16px;">
      <input class="header-edit eyebrow-edit" value="Rudy&#39;s 360" maxlength="40">
      <div style="display:flex;align-items:center;gap:8px;">
        <input class="header-edit title-edit" value="WARMER LABELS" maxlength="40" style="flex:1;">
        <button onclick="resetAll()" style="background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;cursor:pointer;white-space:nowrap;">↺ Reset</button>
      </div>
    </div>
    <div style="display:flex;gap:16px;align-items:flex-end;">
      <div id="global-all-controls" style="display:flex;flex-direction:row;flex-wrap:wrap;gap:8px 16px;align-items:center;visibility:visible;opacity:1;transition:opacity 0.25s ease;">
                <div class="font-controls">
          <span class="size-label" style="color:#aaa;text-transform:uppercase;letter-spacing:0.1em;font-size:9px;">Layout:</span>
          <button id="global-layout-btn" onclick="cycleGlobalLayout()" style="background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;cursor:pointer;min-width:80px;">Eyebrow</button>
        </div>
        <div class="font-controls" id="global-theme-row"></div>
        <button onclick="shuffleAllLabels()" style="background:#F5C518;color:#1A1A1A;border:none;border-radius:3px;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;cursor:pointer;">⇄ Shuffle</button>

                <div class="font-controls" style="align-items:flex-start;">
          <span class="size-label" style="color:#aaa;text-transform:uppercase;letter-spacing:0.1em;font-size:9px;padding-top:6px;">Align:</span>
          <div style="display:grid;grid-template-columns:repeat(3,28px);gap:3px;">
          <button id="global-align-top-left" onclick="setGlobalAlign('top-left')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↖</button>
          <button id="global-align-top-center" onclick="setGlobalAlign('top-center')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↑</button>
          <button id="global-align-top-right" onclick="setGlobalAlign('top-right')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↗</button>
          <button id="global-align-middle-left" onclick="setGlobalAlign('middle-left')" style="background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">←</button>
          <button id="global-align-middle-center" onclick="setGlobalAlign('middle-center')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">·</button>
          <button id="global-align-middle-right" onclick="setGlobalAlign('middle-right')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">→</button>
          <button id="global-align-bottom-left" onclick="setGlobalAlign('bottom-left')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↙</button>
          <button id="global-align-bottom-center" onclick="setGlobalAlign('bottom-center')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↓</button>
          <button id="global-align-bottom-right" onclick="setGlobalAlign('bottom-right')" style="background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">↘</button>
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:stretch;">
          <div style="background:#333;border-radius:3px;padding:6px 14px;display:flex;flex-direction:column;gap:4px;align-items:center;">
            <span style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;">Name</span>
            <div style="display:flex;align-items:center;gap:4px;">
              <button class="size-btn" onclick="adjustGlobalNameSize(-1)">−</button>
              <input class="size-input" id="global-name-size-label" value="21" type="number" min="10" max="36" onchange="adjustGlobalNameSize(0, this.value)" style="width:44px;">
              <button class="size-btn" onclick="adjustGlobalNameSize(1)">+</button>
            </div>
          </div>
          <div style="background:#333;border-radius:3px;padding:6px 14px;display:flex;flex-direction:column;gap:4px;align-items:center;">
            <span style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;">Type</span>
            <div style="display:flex;align-items:center;gap:4px;">
              <button class="size-btn" onclick="adjustGlobalCatSize(-1)">−</button>
              <input class="size-input" id="global-cat-size-label" value="11" type="number" min="6" max="24" onchange="adjustGlobalCatSize(0, this.value)" style="width:44px;">
              <button class="size-btn" onclick="adjustGlobalCatSize(1)">+</button>
            </div>
          </div>
        </div><div style="display:flex;flex-direction:column;gap:5px;">
          
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:stretch;">
        <button class="print-btn" onclick="window.print()">🖨 Print Labels</button>
        <button id="mode-toggle-btn" onclick="toggleGlobalMode()" style="background:#F5C518;color:#1A1A1A;border:none;border-radius:3px;font-family:inherit;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:5px;cursor:pointer;">All</button>
        <span style="font-size:9px;color:#555;letter-spacing:0.06em;text-align:center;">Apply font, size, theme &amp; layout to all</span>
      </div>
    </div>
  </div>
  <div class="no-print" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:#F5C518;border-radius:6px;">
    <span style="font-size:10px;color:#1A1A1A;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;font-weight:800;">🖨 Label size</span>
    <span style="font-size:10px;color:#1A1A1A;font-weight:700;">H:</span>
    <input id="print-height-number"  type="text" value="1" oninput="updatePrintHeightFromParts()" style="background:#1A1A1A;border:none;border-radius:3px;color:#F5C518;font-family:inherit;font-size:13px;font-weight:700;padding:6px 10px;width:80px;outline:none;">
    <select id="print-height-unit" onchange="updatePrintHeightFromParts()" style="background:#1A1A1A;border:none;border-radius:3px;color:#F5C518;font-family:inherit;font-size:13px;font-weight:700;padding:6px 10px;outline:none;cursor:pointer;">
      <option value="in">in</option>
      <option value="cm">cm</option>
    </select>
    <span style="font-size:10px;color:#1A1A1A;font-weight:700;margin-left:6px;">W:</span>
    <input id="print-width-number" type="text" value="2.25" oninput="updatePrintWidthFromParts()" style="background:#1A1A1A;border:none;border-radius:3px;color:#F5C518;font-family:inherit;font-size:13px;font-weight:700;padding:6px 10px;width:70px;outline:none;">
    <select id="print-width-unit" onchange="updatePrintWidthFromParts()" style="background:#1A1A1A;border:none;border-radius:3px;color:#F5C518;font-family:inherit;font-size:13px;font-weight:700;padding:6px 10px;outline:none;cursor:pointer;">
      <option value="in">in</option>
      <option value="cm">cm</option>
    </select>
  </div>
  <div id="shelves-editor"></div>
  <button class="add-shelf-btn" onclick="addShelf()">+ Add Shelf</button>
</div>

<div class="preview-section" id="preview"></div>

<script>
const DEFAULT_CATEGORY = "BREAKFAST TACO";
const CAT_OPTIONS = ["BREAKFAST TACO", "SANDWICH", "WRAP", "SAUSAGE WRAP", "PIGS N BLANKET", "__custom__"];

let shelves = [
  {
    name: "Taco Warmer — Top Shelf",
    items: [
      { name: "BRISKET & EGG",         price: "$2.99", cat: "BREAKFAST TACO" , theme: 0, font: "" },
      { name: "BRISKET, EGG & CHEESE", price: "$3.49", cat: "BREAKFAST TACO" , theme: 1, font: "" },
      { name: "BACON & EGG",           price: "$2.99", cat: "BREAKFAST TACO" , theme: 2, font: "" },
      { name: "BACON, EGG & CHEESE",   price: "$3.49", cat: "BREAKFAST TACO" , theme: 0, font: "" },
    ]
  },
  {
    name: "Taco Warmer — Bottom Shelf",
    items: [
      { name: "POTATO & EGG",         price: "$2.99", cat: "BREAKFAST TACO" , theme: 0, font: "" },
      { name: "POTATO, EGG & CHEESE", price: "$3.49", cat: "BREAKFAST TACO" , theme: 1, font: "" },
      { name: "SAUSAGE & EGG",        price: "$2.99", cat: "BREAKFAST TACO" , theme: 2, font: "" },
      { name: "CHOPPED BEEF",         price: "$2.99", cat: "BREAKFAST TACO" , theme: 0, font: "" },
    ]
  },
  {
    name: "Wrap Warmer — Top Shelf",
    items: [
      { name: "CHOPPED BEEF",                price: "$8.99", cat: "SANDWICH" , theme: 0, font: "" },
      { name: "REGULAR SAUSAGE",             price: "$4.49", cat: "SAUSAGE WRAP" , theme: 1, font: "" },
      { name: "JALAPEÑO SAUSAGE",            price: "$4.49", cat: "SAUSAGE WRAP" , theme: 2, font: "" },
      { name: "JALAPEÑO CHEDDAR SAUSAGE",    price: "$4.49", cat: "SAUSAGE WRAP" , theme: 0, font: "" },
    ]
  },
  {
    name: "Wrap Warmer — Bottom Shelf",
    items: [
      { name: "PIGS N BLANKET",   price: "$2.99", cat: "PIGS N BLANKET" , theme: 0, font: "" },
      { name: "WITH CHEESE",      price: "$2.99", cat: "PIGS N BLANKET" , theme: 1, font: "" },
    ]
  }
];



function nameFontSize(name, hasType, b) {
  return (b || fontSizeBase) + 'px';
}

function allows2Lines(layout) {
  return layout === 'pricebar' || layout === 'clear';
}

function computeFontSize(name, maxSize, layout) {
  const len = (name || '').replace(/\|/g, '').length;
  if (len === 0) return maxSize;
  const cap = allows2Lines(layout) ? FONT_CAPACITY * 2 : FONT_CAPACITY;
  return Math.min(maxSize, Math.floor(cap / len));
}

function maxCharsForSize(maxSize, layout) {
  const cap = allows2Lines(layout) ? FONT_CAPACITY * 2 : FONT_CAPACITY;
  return Math.floor(cap / maxSize) + 1; // +1 for | break char
}

function makeCard(item) {
  const theme = THEMES[item.theme !== undefined ? item.theme % THEMES.length : 0];
  const card = document.createElement('div');
  card.className = 'card';
  const cardLayout = item.layout || layoutMode;
  const hasType = !!(item.cat) && cardLayout !== 'clear' && cardLayout !== 'pricebar';
  const baseSize = item.fontSize || fontSizeBase;
  const fs = nameFontSize(item.name, hasType, baseSize);
  const effectiveFont = item.font || labelFont;
  const nameAlign = item.nameAlign || 'middle-left';
  const _naParts = nameAlign.split('-');
  const _naV = _naParts[0], _naH = _naParts[1] || 'left';
  const _hMap = { left: 'flex-start', center: 'center', right: 'flex-end' };
  const _vMap = { top: 'flex-start', middle: 'center', bottom: 'flex-end' };
  const alignCSS = 'align-items:' + (_vMap[_naV]||'center') + ';justify-content:' + (_hMap[_naH]||'flex-start') + ';text-align:' + (_naH||'left') + ';';
  const nameStyle = hasType
    ? `font-size:${fs};font-family:${effectiveFont};font-weight:800;color:${theme.text};overflow:hidden;${(item.name||'').includes('|') ? '' : 'white-space:nowrap;'}${alignCSS}`
    : `font-size:${fs};font-family:${effectiveFont};font-weight:800;color:${theme.text};overflow:hidden;${alignCSS}`;
  const displayName = (item.name || '').replace(/\|/g, '<br>');
  const nameInner = hasType
    ? displayName
    : `<span style="display:block;word-break:break-word;overflow:hidden;width:100%;line-height:1.15;">${displayName}</span>`;
  card.style.background = theme.bg;
  if (cardLayout === 'eyebrow') {
    card.innerHTML = `
      <div class="card-red" style="background:${theme.accent}"></div>
      <div class="card-type" style="font-size:${item.catSize||11}px;font-family:${effectiveFont};color:${theme.catColor}">${item.cat || ''}</div>
      <div class="card-name" style="${nameStyle}">${nameInner}</div>
      <div class="card-price" style="background:${theme.priceBar};color:${theme.priceText}">${item.price || ''}</div>
    `;
  } else if (cardLayout === 'stacked') {
    card.innerHTML = `
      <div class="card-red" style="background:${theme.accent}"></div>
      <div class="card-name" style="${nameStyle}">${nameInner}</div>
      <div class="card-type card-type-bottom" style="font-size:${item.catSize||11}px;font-family:${effectiveFont};color:${theme.catColor}">${item.cat || ''}</div>
      <div class="card-price" style="background:${theme.priceBar};color:${theme.priceText}">${item.price || ''}</div>
    `;
  } else if (cardLayout === 'pricebar') {
    card.innerHTML = `
      <div class="card-red" style="background:${theme.accent}"></div>
      <div class="card-name" style="${nameStyle}">${nameInner}</div>
      <div class="card-price" style="background:${theme.priceBar};color:${theme.priceText};display:flex;justify-content:space-between;align-items:center;padding:4px 10px;">
        <span style="font-size:${item.catSize||11}px;font-family:${effectiveFont};color:${theme.catColor};letter-spacing:0.1em;white-space:nowrap;overflow:hidden;max-width:60%;">${item.cat || ''}</span>
        <span>${item.price || ''}</span>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="card-red" style="background:${theme.accent}"></div>
      <div class="card-name" style="${nameStyle}">${nameInner}</div>
      <div class="card-price" style="background:${theme.priceBar};color:${theme.priceText}">${item.price || ''}</div>
    `;
  }
  return card;
}

function adjustGlobalNameSize(delta, directVal) {
  const capMax = Math.min(...shelves.flatMap(s => s.items.map(i => computeFontSize(i.name, 36))));
  if (directVal !== undefined) {
    globalNameSize = Math.min(capMax, Math.max(10, parseInt(directVal) || globalNameSize));
  } else {
    globalNameSize = Math.min(delta > 0 ? capMax : 36, Math.max(10, globalNameSize + delta));
  }
  const el = document.getElementById('global-name-size-label');
  if (el) el.value = globalNameSize;
  applyGlobalSizes();
  document.querySelectorAll('.input-name').forEach(inp => {
    inp.maxLength = Math.floor(FONT_CAPACITY / globalNameSize);
  });
}

function adjustGlobalCatSize(delta) {
  globalCatSize = Math.min(24, Math.max(6, globalCatSize + delta));
  document.getElementById('global-cat-size-label').textContent = globalCatSize + 'px';

let printWidthManual = false;

function updatePrintWidthFromParts() {
  printWidthManual = true;
  applyPrintDimensions();
}

function updatePrintHeightFromParts() {
  if (!printWidthManual) {
    const num = parseFloat(document.getElementById('print-height-number').value) || 1;
    const unit = document.getElementById('print-height-unit').value || 'in';
    const autoW = (num * 2.25).toFixed(4);
    document.getElementById('print-width-number').value = autoW;
    document.getElementById('print-width-unit').value = unit;
  }
  applyPrintDimensions();
}

function applyPrintDimensions() {
  const hNum = parseFloat(document.getElementById('print-height-number').value) || 1;
  const hUnit = document.getElementById('print-height-unit').value || 'in';
  const wNum = parseFloat(document.getElementById('print-width-number').value) || (hNum * 2.25);
  const wUnit = document.getElementById('print-width-unit').value || 'in';
  // Base card is 0.9in x 2.25in. zoom scales height + text. Width is adjusted to
  // counteract zoom so final printed width matches user's target.
  const hInches = hUnit === 'in' ? hNum : hNum / 2.54;
  const wInches = wUnit === 'in' ? wNum : wNum / 2.54;
  const zoom = hInches / 0.9;
  // After zoom, card width = 2.25 * zoom. Divide target by zoom to get pre-zoom width.
  const adjustedW = (wInches / zoom).toFixed(4);
  let s = document.getElementById('print-height-style');
  if (!s) { s = document.createElement('style'); s.id = 'print-height-style'; document.head.appendChild(s); }
  s.textContent = '@media print { .card { zoom: ' + zoom.toFixed(4) + '; width: ' + adjustedW + 'in !important; } }';
  try {
    localStorage.setItem('rudys_print_height_num', hNum);
    localStorage.setItem('rudys_print_height_unit', hUnit);
    localStorage.setItem('rudys_print_width_num', wNum);
    localStorage.setItem('rudys_print_width_unit', wUnit);
  } catch(e) {}
}

function loadPrintHeight() {
  try {
    const hNum = localStorage.getItem('rudys_print_height_num') || '1';
    const hUnit = localStorage.getItem('rudys_print_height_unit') || 'in';
    const wNum = localStorage.getItem('rudys_print_width_num') || (parseFloat(hNum) * 2.25).toFixed(4);
    const wUnit = localStorage.getItem('rudys_print_width_unit') || hUnit;
    document.getElementById('print-height-number').value = hNum;
    document.getElementById('print-height-unit').value = hUnit;
    document.getElementById('print-width-number').value = wNum;
    document.getElementById('print-width-unit').value = wUnit;
    if (localStorage.getItem('rudys_print_width_num')) printWidthManual = true;
    updatePrintHeightFromParts();
  } catch(e) {}
}

function resetAll() {
  if (!confirm('Reset all labels to defaults?')) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem('rudys_warmer_labels');
    localStorage.removeItem('rudys_print_height_num');
    localStorage.removeItem('rudys_print_height_unit');
    localStorage.removeItem('rudys_print_width_num');
    localStorage.removeItem('rudys_print_width_unit');
  } catch(e) {}
  location.reload();
}

      const layoutBtn = document.createElement('button');
      layoutBtn.style.cssText = 'background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:6px 10px;cursor:pointer;flex:1;';
      const layoutLabels = { eyebrow: 'Eyebrow', stacked: 'Stacked', pricebar: 'Price Bar', clear: 'Clear' };
      const layoutOrder = ['eyebrow','stacked','pricebar','clear'];
      layoutBtn.textContent = layoutLabels[item.layout || layoutMode];
      layoutBtn.onclick = () => {
        const cur = shelves[si].items[ii].layout || layoutMode;
        shelves[si].items[ii].layout = layoutOrder[(layoutOrder.indexOf(cur) + 1) % layoutOrder.length];
        if (shelves[si].items[ii].layout === 'clear') {}
        layoutBtn.textContent = layoutLabels[shelves[si].items[ii].layout];
        refreshItem(si, ii);
      };
      layoutRow.appendChild(layoutLbl);
      layoutRow.appendChild(layoutBtn);

      // Alignment buttons
      const alignRow = document.createElement('div');
      alignRow.style.cssText = 'display:flex;gap:6px;margin-top:6px;align-items:center;';
      const alignLbl = document.createElement('span');
      alignLbl.textContent = 'Align:';
      alignLbl.style.cssText = 'font-size:9px;color:#666;letter-spacing:0.1em;text-transform:uppercase;min-width:40px;';
      alignRow.appendChild(alignLbl);
      const curAlign = item.nameAlign || 'middle-left';
      const alignGrid = document.createElement('div');
      alignGrid.style.cssText = 'display:grid;grid-template-columns:repeat(3,28px);gap:3px;';
      [['top-left','↖'],['top-center','↑'],['top-right','↗'],['middle-left','←'],['middle-center','·'],['middle-right','→'],['bottom-left','↙'],['bottom-center','↓'],['bottom-right','↘']].forEach(([val, icon]) => {
        const b = document.createElement('button');
        b.innerHTML = icon;
        b.style.cssText = val === curAlign ? 'background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;' : 'background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;';
        b.onclick = () => {
          shelves[si].items[ii].nameAlign = val;
          Array.from(alignGrid.querySelectorAll('button')).forEach(c => {
            c.style.cssText = c === b ? 'background:#C1272D;color:#F5C518;border:none;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;' : 'background:#2a2a2a;color:#666;border:1px solid #444;border-radius:3px;font-family:inherit;font-size:12px;font-weight:800;padding:4px 6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;';
          });
          refreshItem(si, ii);
        };
        alignGrid.appendChild(b);
      });
      alignRow.appendChild(alignGrid);
      const perLabel = document.createElement('div');
      perLabel.className = 'per-label-controls' + (globalMode ? ' hidden' : '');
      perLabel.appendChild(alignRow);
      perLabel.appendChild(layoutRow);
      perLabel.appendChild(themeRow);
      perLabel.appendChild(nameSizeRow);
      perLabel.appendChild(catSizeRow);
      group.appendChild(perLabel);
      group.appendChild(previewSlot);
      inputsRow.appendChild(group);
    });

    block.appendChild(inputsRow);
    editor.appendChild(block);
  });

  renderPreview();
}

function renderPreview() {
  saveToStorage();
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  shelves.forEach(shelf => {
    const section = document.createElement('div');
    section.className = 'preview-shelf';

    const lbl = document.createElement('div');
    lbl.className = 'preview-shelf-label';
    lbl.textContent = '▸ ' + shelf.name.toUpperCase();
    section.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'cards-row';
    row.style.cssText = 'position:relative;';
    shelf.items.forEach((item, idx) => {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:inline-flex;align-items:stretch;';
      wrapper.appendChild(makeCard(item));
      if (idx < shelf.items.length - 1) {
        const vline = document.createElement('div');
        vline.className = 'cut-line-v';
        vline.style.cssText = 'width:16px;display:flex;align-items:center;justify-content:center;';
        vline.innerHTML = '<div style="width:0;height:100%;border-left:1px dashed #999;"></div>';
        wrapper.appendChild(vline);
      }
      row.appendChild(wrapper);
    });
    section.appendChild(row);
    preview.appendChild(section);
  });
}

const STORAGE_KEY = 'rudys_warmer_labels_v2';

function saveToStorage() {
  try {
    const eyebrow = document.querySelector('.eyebrow-edit');
    const title   = document.querySelector('.title-edit');
    const data = {
      shelves,
      layoutMode,
      labelFont,
      fontSizeBase,
      catFont,
      catFontSize,
      eyebrow: eyebrow ? eyebrow.value : "Rudy's 360",
      title:   title   ? title.value   : "WARMER LABELS"
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (Array.isArray(data)) {
        shelves = data; // legacy format
      } else {
        shelves = data.shelves;
        if (data.layoutMode) layoutMode = data.layoutMode;
        if (data.labelFont) labelFont = data.labelFont;
        if (data.fontSizeBase) fontSizeBase = data.fontSizeBase;
        if (data.catFont) catFont = data.catFont;
        if (data.catFontSize) catFontSize = data.catFontSize;
        const eyebrow = document.querySelector('.eyebrow-edit');
        const title   = document.querySelector('.title-edit');
        if (eyebrow && data.eyebrow) eyebrow.value = data.eyebrow;
        if (title   && data.title)   title.value   = data.title;
      }
    }
  } catch(e) {}
}



function changeFontSize(delta) {
  fontSizeBase = Math.min(36, Math.max(10, fontSizeBase + delta));
  document.getElementById('size-label').textContent = fontSizeBase + 'px';
  renderPreview();
}
